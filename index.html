<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curricular Sequence</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/print.css" media="print">
  <script src="lib/js-yaml.min.js"></script>
</head>
<body>
  <header class="controls">
    <h1 class="controls__title">Curricular Sequence</h1>
    <div class="controls__row">
      <label class="controls__label">
        General Catalog
        <select id="catalog-year" class="controls__select">
          <option value="">Select year...</option>
        </select>
      </label>
      <label class="controls__label">
        Degree
        <select id="degree" class="controls__select" disabled>
          <option value="">Select degree...</option>
        </select>
      </label>
      <div class="controls__buttons">
        <button id="btn-resettle" class="btn btn--secondary" disabled>Re-settle</button>
        <button id="btn-reset" class="btn btn--secondary" disabled>Reset</button>
        <button id="btn-print" class="btn btn--primary" disabled>Print</button>
      </div>
    </div>
    <div id="degree-info" class="controls__info" hidden>
      <span id="degree-label"></span>
      <span id="degree-credits"></span>
      <span id="degree-terms"></span>
      <span id="degree-alias" class="controls__alias" hidden></span>
    </div>
    <div id="print-header" class="print-header" hidden>
      <label>Name: <input type="text" id="print-student-name" class="print-header__input" placeholder="Student Name"></label>
      <label>Student Number: <input type="text" id="print-student-number" class="print-header__input" placeholder="Student Number"></label>
    </div>
  </header>

  <main id="term-grid" class="term-grid"></main>

  <footer class="legend" hidden>
    <div id="legend-items" class="legend__items"></div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
